name: Auto Label Issues

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto-label by title and body
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const text = title + ' ' + body;

            const rules = [
              { pattern: /\[p1\]/, label: 'p1' },
              { pattern: /\bbug\b|\bfix\b|\bcrash\b|\bbroken\b/, label: 'bug' },
              { pattern: /\bfeat\b|\bfeature\b|\benhancement\b/, label: 'enhancement' },
              { pattern: /\bdoc\b|\bdocs\b|\bdocumentation\b/, label: 'documentation' },
              { pattern: /\bquestion\b|\bhow to\b/, label: 'question' },
              { pattern: /\bself-learn\b|\bself-improvement\b|\binsight\b|\bpattern detect/, label: 'self-learning' },
            ];

            const labelsToAdd = [];
            const currentLabels = issue.labels.map(l => l.name);

            for (const rule of rules) {
              if (rule.pattern.test(text) && !currentLabels.includes(rule.label)) {
                labelsToAdd.push(rule.label);
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd,
              });
              console.log(`Added labels: ${labelsToAdd.join(', ')}`);
            } else {
              console.log('No labels to add');
            }
