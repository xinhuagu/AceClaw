name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACECLAW_RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: taiki-e/install-action@git-cliff

      - name: Compute next version
        id: version
        run: |
          # gradle.properties holds the in-progress SNAPSHOT (e.g. 0.3.19-SNAPSHOT).
          # `patch` releases that version as-is; `minor` and `major` re-derive
          # the release version from semver rules so the user can pick the bump
          # type at trigger time without first hand-editing gradle.properties.
          # The post-release "Bump to next SNAPSHOT" step always advances by
          # patch+1 from whatever we publish here.
          CURRENT=$(grep '^version=' gradle.properties | cut -d= -f2)
          BARE="${CURRENT%-SNAPSHOT}"
          MAJOR=$(echo "$BARE" | cut -d. -f1)
          MINOR=$(echo "$BARE" | cut -d. -f2)
          PATCH=$(echo "$BARE" | cut -d. -f3)
          case "${{ inputs.bump }}" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT="${BARE}" ;;
            *) echo "Invalid bump: ${{ inputs.bump }}"; exit 1 ;;
          esac
          echo "next=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${NEXT} (bump=${{ inputs.bump }}, current=${CURRENT})"

      - name: Bump gradle.properties
        run: |
          BARE="${{ steps.version.outputs.next }}"
          BARE="${BARE#v}"
          sed -i "s/^version=.*/version=${BARE}/" gradle.properties

      - name: Update CHANGELOG.md
        run: |
          git cliff --unreleased \
            --tag ${{ steps.version.outputs.next }} \
            --prepend CHANGELOG.md

      - name: Generate release body
        run: |
          git cliff --unreleased \
            --tag ${{ steps.version.outputs.next }} \
            --strip all > /tmp/release-body.md

      - name: Commit and tag
        run: |
          git add gradle.properties CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.next }}"
          git tag -a ${{ steps.version.outputs.next }} \
            -m "Release ${{ steps.version.outputs.next }}"
          git push origin HEAD:main --follow-tags

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aceclaw-dashboard/package-lock.json
      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew clean build :aceclaw-cli:distTar :aceclaw-cli:distZip --no-daemon

      - name: Verify artifacts
        run: |
          ls -la aceclaw-cli/build/distributions/
          test -n "$(ls aceclaw-cli/build/distributions/*.zip 2>/dev/null)"
          test -n "$(ls aceclaw-cli/build/distributions/*.tar.gz 2>/dev/null || ls aceclaw-cli/build/distributions/*.tar 2>/dev/null)"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next }}
          name: "Release ${{ steps.version.outputs.next }}"
          body_path: /tmp/release-body.md
          fail_on_unmatched_files: false
          files: |
            aceclaw-cli/build/distributions/*

      - name: Bump to next SNAPSHOT
        run: |
          BARE="${{ steps.version.outputs.next }}"
          BARE="${BARE#v}"
          # Increment patch: 0.3.1 -> 0.3.2-SNAPSHOT
          MAJOR=$(echo "$BARE" | cut -d. -f1)
          MINOR=$(echo "$BARE" | cut -d. -f2)
          PATCH=$(echo "$BARE" | cut -d. -f3)
          NEXT_DEV="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          sed -i "s/^version=.*/version=${NEXT_DEV}/" gradle.properties
          git add gradle.properties
          git commit -m "chore: bump to ${NEXT_DEV} for development"
          git push origin HEAD:main
